<svg width="192" height="192" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a2f22" />
      <stop offset="1" stop-color="#1a1410" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent_grad" x1="100" y1="256" x2="412" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c5a381" />
      <stop offset="1" stop-color="#7a6750" />
    </linearGradient>

    <!-- Glow Filter for Central Node -->
    <filter id="center_glow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle-like Background -->
  <rect x="25.6" y="25.6" width="460.8" height="460.8" rx="120" fill="url(#bg_grad)"/>
  
  <!-- Subtle line background (shadow) -->
  <line x1="80" y1="258" x2="432" y2="258" stroke="#000" stroke-width="16" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Main Path Line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="url(#accent_grad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Small Nodes -->
  <circle cx="140" cy="256" r="28" fill="#c5a381" stroke="#1a1410" stroke-width="4"/>
  <circle cx="372" cy="256" r="28" fill="#c5a381" stroke="#1a1410" stroke-width="4"/>
  
  <!-- Central Glowing Node -->
  <g filter="url(#center_glow)">
    <circle cx="256" cy="256" r="48" fill="#f2ece2"/>
    <circle cx="256" cy="256" r="38" stroke="#c5a381" stroke-width="6"/>
    <circle cx="256" cy="256" r="20" fill="#7a6750"/>
  </g>
</svg>
